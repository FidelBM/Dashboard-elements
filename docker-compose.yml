services:
  db:
    image: postgres:16-alpine
    container_name: ml-reviews-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ml_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ml_app_password}
      POSTGRES_DB: ${POSTGRES_DB:-ml_reviews}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ml_app} -d ${POSTGRES_DB:-ml_reviews}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-api:
    build:
      context: ./services/ml-api
      dockerfile: Dockerfile
    container_name: ml-reviews-api
    restart: unless-stopped
    environment:
      ML_API_ENV: ${ML_API_ENV:-development}
      USE_EXTERNAL_AI_RECOMMENDATIONS: ${USE_EXTERNAL_AI_RECOMMENDATIONS:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ml_app}:${POSTGRES_PASSWORD:-ml_app_password}@db:5432/${POSTGRES_DB:-ml_reviews}?schema=public
    ports:
      - "${ML_API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/model-health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ml-reviews-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ml_app}:${POSTGRES_PASSWORD:-ml_app_password}@db:5432/${POSTGRES_DB:-ml_reviews}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-ml_app}:${POSTGRES_PASSWORD:-ml_app_password}@db:5432/${POSTGRES_DB:-ml_reviews}?schema=public
      NEXT_PUBLIC_ML_API_URL: ${NEXT_PUBLIC_ML_API_URL:-http://localhost:8000}
      ML_API_INTERNAL_URL: ${ML_API_INTERNAL_URL:-http://ml-api:8000}
      ML_API_PORT: ${ML_API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
